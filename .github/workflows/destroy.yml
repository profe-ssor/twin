name: Destroy Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      confirm:
        description: 'Type the environment name to confirm destruction'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Destroy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]; then
            echo "❌ Confirmation does not match environment name!"
            echo "You entered: '${{ github.event.inputs.confirm }}'"
            echo "Expected: '${{ github.event.inputs.environment }}'"
            exit 1
          fi
          echo "✅ Destruction confirmed for ${{ github.event.inputs.environment }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize and validate AWS_ROLE_ARN
        id: aws_role
        env:
          RAW_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail
          arn="${RAW_ARN//$'\r'/}"
          arn="${arn//$'\n'/}"
          arn="${arn//[[:space:]]/}"
          arn="${arn%\"}"
          arn="${arn#\"}"
          if [ -z "$arn" ]; then
            echo "::error::AWS_ROLE_ARN is empty. Add it under Settings → Secrets and variables → Actions (and per Environment if applicable)."
            exit 1
          fi
          if ! [[ "$arn" =~ ^arn:aws:iam::[0-9]{12}:role/ ]]; then
            echo "::error::AWS_ROLE_ARN must be a full IAM role ARN, e.g. arn:aws:iam::769579993885:role/github-actions-twin-deploy (not the OIDC provider ARN)."
            exit 1
          fi
          echo "arn=$arn" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.aws_role.outputs.arn }}
          role-session-name: github-actions-destroy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false  # Important: disable wrapper to get raw outputs

      - name: Run Destroy Script
        run: |
          # Set environment variables for the script
          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export DEFAULT_AWS_REGION=${{ secrets.DEFAULT_AWS_REGION }}
          
          # Make script executable and run it
          chmod +x scripts/destroy.sh
          ./scripts/destroy.sh ${{ github.event.inputs.environment }}
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          CI: true
          TF_INPUT: "0"
          TF_IN_AUTOMATION: "1"

      - name: Destruction Complete
        run: |
          echo "✅ Environment ${{ github.event.inputs.environment }} has been destroyed!"